name: DocPilot
options:
  bundleIdPrefix: com.docpilot
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "26.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
configs:
  Debug: debug
  Release: release
targets:
  DocPilot:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - path: DocPilot
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    info:
      path: Config/Info.plist
      properties:
        CFBundleDisplayName: DocPilot
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSApplicationCategoryType: public.app-category.productivity
        API_BASE_URL: $(API_BASE_URL)
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.docpilot.app
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        CODE_SIGNING_ALLOWED: NO
    scheme:
      testTargets:
        - DocPilotTests
  DocPilotTests:
    type: bundle.unit-test
    supportedDestinations: [iOS, macOS]
    sources:
      - path: DocPilotTests
    dependencies:
      - target: DocPilot
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.docpilot.app.tests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGNING_ALLOWED: NO
        "TEST_HOST[sdk=macosx*]": $(BUILT_PRODUCTS_DIR)/DocPilot.app/Contents/MacOS/DocPilot
        "BUNDLE_LOADER[sdk=macosx*]": $(TEST_HOST)
