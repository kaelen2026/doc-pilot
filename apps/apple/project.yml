name: DocPilot
options:
  bundleIdPrefix: com.docpilot
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
configs:
  Debug: debug
  Release: release
targets:
  DocPilot:
    type: application
    supportedDestinations: [iOS]
    sources:
      - path: DocPilot
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    info:
      path: Config/Info.plist
      properties:
        CFBundleDisplayName: DocPilot
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSApplicationCategoryType: public.app-category.productivity
        API_BASE_URL: $(API_BASE_URL)
        # 无此键 iOS 会以兼容 letterbox 缩放运行(黑边+顶部大片留白),故必须声明以启用原生全屏。
        UILaunchScreen: {}
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.docpilot.app
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
    scheme:
      testTargets:
        - DocPilotTests
  DocPilotTests:
    type: bundle.unit-test
    supportedDestinations: [iOS]
    sources:
      - path: DocPilotTests
    dependencies:
      - target: DocPilot
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.docpilot.app.tests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGNING_ALLOWED: NO
  DocPilotUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: DocPilotUITests
    dependencies:
      - target: DocPilot
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.docpilot.app.uitests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  DocPilotLiveSmoke:
    build:
      targets:
        DocPilot: all
        DocPilotUITests: [test]
    test:
      targets:
        - name: DocPilotUITests
