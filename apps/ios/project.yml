name: DocPilot
options:
  bundleIdPrefix: dev.w3ctech
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: R6W2DUVWG3
    CODE_SIGN_STYLE: Automatic
configs:
  Debug: debug
  Release: release
targets:
  DocPilot:
    type: application
    supportedDestinations: [iOS]
    sources:
      - path: DocPilot
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    entitlements:
      path: Config/DocPilot.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
    info:
      path: Config/Info.plist
      properties:
        CFBundleDisplayName: DocPilot
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSApplicationCategoryType: public.app-category.productivity
        API_BASE_URL: $(API_BASE_URL)
        # 扫码登录网页版需相机扫描二维码(账户页「扫码登录网页版」)。
        NSCameraUsageDescription: 用于扫描二维码,登录 DocPilot 网页版。
        # 无此键 iOS 会以兼容 letterbox 缩放运行(黑边+顶部大片留白),故必须声明以启用原生全屏。
        UILaunchScreen: {}
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.w3ctech.docpilot
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
  DocPilotTests:
    type: bundle.unit-test
    supportedDestinations: [iOS]
    sources:
      - path: DocPilotTests
    dependencies:
      - target: DocPilot
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.w3ctech.docpilot.tests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGNING_ALLOWED: NO
  DocPilotUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: DocPilotUITests
    dependencies:
      - target: DocPilot
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.w3ctech.docpilot.uitests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  # 主 scheme 命名为 docpilot(此前由 DocPilot target 自动生成的同名 scheme 迁到此处显式声明)。
  docpilot:
    build:
      targets:
        DocPilot: all
    test:
      targets:
        - name: DocPilotTests
  DocPilotLiveSmoke:
    build:
      targets:
        DocPilot: all
        DocPilotUITests: [test]
    test:
      targets:
        - name: DocPilotUITests
