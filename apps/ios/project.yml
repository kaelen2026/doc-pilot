name: DocPilot
options:
  bundleIdPrefix: dev.w3ctech
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    # 故意留空:不硬编码团队。推送(aps-environment)真机联调时需本地覆盖为自己的
    # DEVELOPMENT_TEAM 才能签发带 push 能力的描述文件;模拟器构建不校验此受限 entitlement。
    # 每配置的 CODE_SIGN_ENTITLEMENTS 见 Config/Debug.xcconfig / Config/Release.xcconfig。
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
configs:
  Debug: debug
  Release: release
packages:
  # 原生 Google 登录:GoogleSignIn-iOS(SPM)。产品名 GoogleSignIn。
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "9.2.0"
targets:
  DocPilot:
    type: application
    supportedDestinations: [iOS]
    sources:
      - path: DocPilot
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    dependencies:
      - package: GoogleSignIn
        product: GoogleSignIn
    info:
      path: Config/Info.plist
      properties:
        CFBundleDisplayName: DocPilot
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSApplicationCategoryType: public.app-category.productivity
        API_BASE_URL: $(API_BASE_URL)
        # 原生 Google 登录:iOS 类型 OAuth client id(GIDSignIn 据此自动配置,无需 GoogleService-Info.plist)。
        GIDClientID: 186506785937-28panmdpubo6puvtgguadfmdnuaac8tk.apps.googleusercontent.com
        # Google 回调 URL scheme = 反转 client id;GIDSignIn.handle(url) 消费此回调。
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - com.googleusercontent.apps.186506785937-28panmdpubo6puvtgguadfmdnuaac8tk
        # 扫码登录网页版需相机扫描二维码(账户页「扫码登录网页版」)。
        NSCameraUsageDescription: 用于扫描二维码,登录 DocPilot 网页版。
        # 无此键 iOS 会以兼容 letterbox 缩放运行(黑边+顶部大片留白),故必须声明以启用原生全屏。
        UILaunchScreen: {}
        # App Store 校验(90474)要求声明支持的方向;iPhone-only 用竖屏 + 左右横屏。
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        # 仅用 HTTPS/TLS 与 SHA-256 哈希(SIWA nonce、上传校验和),属出口合规豁免。
        # 声明为 false 免去 TestFlight 每版的 Missing Compliance 手填。
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.w3ctech.docpilot
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        # iPad 已从原生 app 移除,锁 iPhone-only(避免 App Store 要求 iPad 多任务全方向)。
        TARGETED_DEVICE_FAMILY: "1"
  DocPilotTests:
    type: bundle.unit-test
    supportedDestinations: [iOS]
    sources:
      - path: DocPilotTests
    dependencies:
      - target: DocPilot
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.w3ctech.docpilot.tests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGNING_ALLOWED: NO
  DocPilotUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: DocPilotUITests
    dependencies:
      - target: DocPilot
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.w3ctech.docpilot.uitests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  # 主 scheme 命名为 docpilot(此前由 DocPilot target 自动生成的同名 scheme 迁到此处显式声明)。
  docpilot:
    build:
      targets:
        DocPilot: all
    test:
      targets:
        - name: DocPilotTests
  DocPilotLiveSmoke:
    build:
      targets:
        DocPilot: all
        DocPilotUITests: [test]
    test:
      targets:
        - name: DocPilotUITests
