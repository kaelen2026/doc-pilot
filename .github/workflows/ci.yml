name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint --error-on-warnings

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm test:staging-tools

  coverage:
    runs-on: ubuntu-latest
    # api/worker 的 coverage 口径含集成测试(vitest.coverage.config.ts),需要真实 Postgres/Redis。
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: docpilot
          POSTGRES_PASSWORD: docpilot
          POSTGRES_DB: docpilot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U docpilot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://docpilot:docpilot@localhost:5432/docpilot
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:migrate
      - run: pnpm test:coverage

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: docpilot
          POSTGRES_PASSWORD: docpilot
          POSTGRES_DB: docpilot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U docpilot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      # outbox publisher 集成测试要真连 Redis/BullMQ(镜像与本地 compose 同口径)
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://docpilot:docpilot@localhost:5432/docpilot
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:migrate
      - run: pnpm --filter @doc-pilot/api test:integration
      - run: pnpm --filter @doc-pilot/worker test:integration

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  ios:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - name: Build iOS Simulator without signing
        run: |
          xcodebuild \
            -project apps/ios/DocPilot.xcodeproj \
            -scheme docpilot \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro,OS=latest' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build
      - name: Run iOS unit tests
        run: |
          xcodebuild \
            -project apps/ios/DocPilot.xcodeproj \
            -scheme docpilot \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro,OS=latest' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            -only-testing:DocPilotTests \
            test

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
      - name: Run Android unit tests and lint
        run: ./gradlew testDebugUnitTest lintDebug
        working-directory: apps/android

  commitlint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose
