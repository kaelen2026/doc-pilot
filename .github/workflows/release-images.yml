# 构建并推送 web/api/worker 三个运行时镜像到 GHCR。
# 触发:打 v* tag(发版),或手动 workflow_dispatch(可传 web 的 NEXT_PUBLIC_* build args)。
# migrate 镜像(含构建期全量依赖,2GB+)不推送 —— 部署主机用 compose 的 migrate target 现场构建。
name: Release Images

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      next_public_api_url:
        description: "web build arg NEXT_PUBLIC_API_URL(留空则回落 localhost 默认)"
        type: string
        default: ""
      next_public_app_url:
        description: "web build arg NEXT_PUBLIC_APP_URL"
        type: string
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: api
            dockerfile: apps/api/Dockerfile
          - name: worker
            dockerfile: apps/worker/Dockerfile
          - name: web
            dockerfile: apps/web/Dockerfile
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/doc-pilot-${{ matrix.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 仅 web 用得到;api/worker 不声明这些 arg,BuildKit 会忽略。
          build-args: |
            NEXT_PUBLIC_API_URL=${{ inputs.next_public_api_url }}
            NEXT_PUBLIC_APP_URL=${{ inputs.next_public_app_url }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
